services:
  - type: web
    name: wire-test
    runtime: python
    buildCommand: pip install -r render-requirements.txt
    startCommand: gunicorn render.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000